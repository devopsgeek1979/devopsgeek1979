<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .loop {
        fill: none;
        stroke: url(#grad);
        stroke-width: 8;
        stroke-linecap: round;
        filter: url(#glow);
        stroke-dasharray: 20;
        animation: dash 4s linear infinite;
      }

      @keyframes dash {
        to {
          stroke-dashoffset: -200;
        }
      }

      .text {
        fill: #e2e8f0;
        font-family: Arial, sans-serif;
        font-size: 16px;
        text-anchor: middle;
      }

      .title {
        fill: #38bdf8;
        font-size: 22px;
        font-weight: bold;
        text-anchor: middle;
      }

      .watermark {
        fill: #1e293b;
        font-size: 14px;
        text-anchor: middle;
        opacity: 0.5;
      }
    </style>
  </defs>

  <!-- Title -->
  <text x="450" y="40" class="title">DevOps Lifecycle</text>

  <!-- Infinity Loop -->
  <path d="M200,150 
           C200,80 350,80 350,150 
           C350,220 500,220 500,150 
           C500,80 650,80 650,150 
           C650,220 500,220 500,150 
           C500,80 350,80 350,150 
           C350,220 200,220 200,150"
        class="loop"/>

  <!-- Labels -->
  <text x="275" y="85" class="text">Code</text>
  <text x="450" y="60" class="text">Build</text>
  <text x="625" y="85" class="text">Test</text>
  <text x="625" y="215" class="text">Deploy</text>
  <text x="450" y="240" class="text">Monitor</text>
  <text x="275" y="215" class="text">Feedback</text>

  <!-- Tech Labels -->
  <text x="320" y="150" class="text">AWS</text>
  <text x="580" y="150" class="text">Kubernetes</text>

  <!-- Branding -->
  <text x="450" y="280" class="watermark">Shashi Pal • DevOps Engineer</text>
</svg>
