<svg width="1000" height="320" viewBox="0 0 1000 320" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .loop {
        fill: none;
        stroke: url(#grad);
        stroke-width: 8;
        stroke-linecap: round;
        stroke-dasharray: 25;
        animation: dash 4s linear infinite;
        filter: url(#glow);
      }

      @keyframes dash {
        to { stroke-dashoffset: -200; }
      }

      .label {
        fill: #e2e8f0;
        font-size: 14px;
        text-anchor: middle;
        font-family: Arial, sans-serif;
      }

      .title {
        fill: #38bdf8;
        font-size: 22px;
        text-anchor: middle;
        font-weight: bold;
      }

      .node {
        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
        0%,100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }

      .watermark {
        fill: #1e293b;
        font-size: 14px;
        text-anchor: middle;
        opacity: 0.5;
      }
    </style>
  </defs>

  <!-- Title -->
  <text x="500" y="40" class="title">DevOps Lifecycle</text>

  <!-- Infinity Loop -->
  <path d="M250,160 
           C250,90 400,90 400,160 
           C400,230 550,230 550,160 
           C550,90 700,90 700,160 
           C700,230 550,230 550,160 
           C550,90 400,90 400,160 
           C400,230 250,230 250,160"
        class="loop"/>

  <!-- Labels -->
  <text x="320" y="100" class="label">Code</text>
  <text x="500" y="80" class="label">Build</text>
  <text x="680" y="100" class="label">Test</text>
  <text x="680" y="230" class="label">Deploy</text>
  <text x="500" y="250" class="label">Monitor</text>
  <text x="320" y="230" class="label">Feedback</text>

  <!-- Icons (moving nodes) -->
  
  <!-- Docker -->
  <image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/docker/docker-original.svg"
         x="360" y="140" width="40" height="40" class="node"/>

  <!-- AWS -->
  <image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/amazonwebservices/amazonwebservices-original-wordmark.svg"
         x="480" y="130" width="60" height="40" class="node"/>

  <!-- Kubernetes -->
  <image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/kubernetes/kubernetes-plain.svg"
         x="600" y="140" width="40" height="40" class="node"/>

  <!-- CI/CD -->
  <image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg"
         x="450" y="200" width="35" height="35" class="node"/>

  <!-- Monitoring -->
  <image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/grafana/grafana-original.svg"
         x="540" y="200" width="35" height="35" class="node"/>

  <!-- Branding -->
  <text x="500" y="300" class="watermark">Shashi Pal • DevOps Engineer</text>

</svg>
